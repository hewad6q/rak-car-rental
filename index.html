    <script type="module">
      // Import Firebase SDKs from CDN
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        addDoc, 
        setDoc,
        getDoc,
        getDocs, 
        updateDoc, 
        deleteDoc,
        onSnapshot,
        query,
        orderBy,
        where,
        serverTimestamp,
        limit
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Initialize Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyCXU3AiLSSl2RPBrJP6s0dOgs_T0Sb1FjY",
        authDomain: "speed-rental-rak.firebaseapp.com",
        projectId: "speed-rental-rak",
        storageBucket: "speed-rental-rak.firebasestorage.app",
        messagingSenderId: "917938638656",
        appId: "1:917938638656:web:6ec6435de59818f28fb4a5"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app, "ai-studio-0ab0de5f-dc97-42bd-b8f6-8e174be9b1c9");

      // Make db and Firebase functions available globally
      window.db = db;
      window.fbCollection = collection;
      window.fbDoc = doc;
      window.fbAddDoc = addDoc;
      window.fbSetDoc = setDoc;
      window.fbGetDoc = getDoc;
      window.fbGetDocs = getDocs;
      window.fbUpdateDoc = updateDoc;
      window.fbDeleteDoc = deleteDoc;
      window.fbOnSnapshot = onSnapshot;
      window.fbQuery = query;
      window.fbOrderBy = orderBy;
      window.fbWhere = where;
      window.fbServerTimestamp = serverTimestamp;
      window.fbLimit = limit;

      // Offline cache/fallback helpers
      function cacheToLocalStorage(collectionName, data, id) {
        const key = "fb_cache_" + collectionName;
        try {
          const cached = JSON.parse(localStorage.getItem(key) || "[]");
          const existingIdx = cached.findIndex(item => item.firestoreId === id);
          if (existingIdx !== -1) {
            cached[existingIdx] = { firestoreId: id, ...data };
          } else {
            cached.unshift({ firestoreId: id, ...data });
          }
          localStorage.setItem(key, JSON.stringify(cached.slice(0, 200)));
        } catch(e) {}
      }

      function saveToLocalStorageFallback(collectionName, data) {
        const id = "local_" + Date.now();
        try {
          const pending = JSON.parse(localStorage.getItem("fb_pending_writes") || "[]");
          pending.push({ action: "create", collection: collectionName, data, tempId: id });
          localStorage.setItem("fb_pending_writes", JSON.stringify(pending));
          cacheToLocalStorage(collectionName, data, id);
        } catch(e) {}
        return id;
      }

      function updateLocalStorageCache(collectionName, docId, data) {
        const key = "fb_cache_" + collectionName;
        try {
          const cached = JSON.parse(localStorage.getItem(key) || "[]");
          const idx = cached.findIndex(item => item.firestoreId === docId);
          if (idx !== -1) {
            cached[idx] = { ...cached[idx], ...data };
            localStorage.setItem(key, JSON.stringify(cached));
          }
        } catch(e) {}
      }

      function removeFromLocalStorageCache(collectionName, docId) {
        const key = "fb_cache_" + collectionName;
        try {
          const cached = JSON.parse(localStorage.getItem(key) || "[]");
          const updated = cached.filter(item => item.firestoreId !== docId);
          localStorage.setItem(key, JSON.stringify(updated));
        } catch(e) {}
      }

      // Master Firebase Helper Functions
      async function saveToFirestore(collectionName, data) {
        try {
          const colRef = collection(db, collectionName);
          const docRef = await addDoc(colRef, {
            ...data,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          cacheToLocalStorage(collectionName, data, docRef.id);
          return docRef.id;
        } catch(error) {
          console.error("Firestore save error:", error);
          return saveToLocalStorageFallback(collectionName, data);
        }
      }

      async function updateInFirestore(collectionName, docId, data) {
        try {
          const docRef = doc(db, collectionName, docId);
          await updateDoc(docRef, {
            ...data,
            updatedAt: serverTimestamp()
          });
          updateLocalStorageCache(collectionName, docId, data);
          return true;
        } catch(error) {
          console.error("Firestore update error:", error);
          return false;
        }
      }

      async function deleteFromFirestore(collectionName, docId) {
        try {
          const docRef = doc(db, collectionName, docId);
          await deleteDoc(docRef);
          removeFromLocalStorageCache(collectionName, docId);
          return true;
        } catch(error) {
          console.error("Firestore delete error:", error);
          return false;
        }
      }

      async function getFromFirestore(collectionName, orderByField) {
        try {
          const colRef = collection(db, collectionName);
          const q = orderByField 
            ? query(colRef, orderBy(orderByField, "asc"))
            : colRef;
          const snapshot = await getDocs(q);
          const data = [];
          snapshot.forEach(docSnap => {
            data.push({ firestoreId: docSnap.id, ...docSnap.data() });
          });
          localStorage.setItem("fb_cache_" + collectionName, JSON.stringify(data));
          return data;
        } catch(error) {
          console.error("Firestore get error:", error);
          const cached = localStorage.getItem("fb_cache_" + collectionName);
          return cached ? JSON.parse(cached) : [];
        }
      }

      async function getSingleDoc(collectionName, docId) {
        try {
          const docRef = doc(db, collectionName, docId);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            return { firestoreId: docSnap.id, ...docSnap.data() };
          }
          return null;
        } catch(error) {
          console.error("Firestore get single error:", error);
          const cached = localStorage.getItem("fb_cache_" + collectionName + "_" + docId);
          return cached ? JSON.parse(cached) : null;
        }
      }

      async function setSingleDoc(collectionName, docId, data) {
        try {
          const docRef = doc(db, collectionName, docId);
          await setDoc(docRef, {
            ...data,
            updatedAt: serverTimestamp()
          }, { merge: true });
          localStorage.setItem("fb_cache_" + collectionName + "_" + docId, JSON.stringify(data));
          return true;
        } catch(error) {
          console.error("Firestore set doc error:", error);
          return false;
        }
      }

      function listenToCollection(collectionName, callback, orderByField) {
        try {
          const colRef = collection(db, collectionName);
          const q = orderByField
            ? query(colRef, orderBy(orderByField, "asc"))
            : colRef;
          return onSnapshot(q, (snapshot) => {
            const data = [];
            snapshot.forEach(docSnap => {
              data.push({ firestoreId: docSnap.id, ...docSnap.data() });
            });
            callback(data);
          }, (error) => {
            console.error("Firestore listener error:", error);
          });
        } catch(error) {
          console.error("Firestore listen error:", error);
        }
      }

      function listenToDoc(collectionName, docId, callback) {
        try {
          const docRef = doc(db, collectionName, docId);
          return onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
              callback({ firestoreId: docSnap.id, ...docSnap.data() });
            }
          });
        } catch(error) {
          console.error("Firestore doc listen error:", error);
        }
      }

      async function incrementAnalytic(field, amount) {
        try {
          const current = await getSingleDoc("analytics", "main") || {};
          current[field] = (Number(current[field]) || 0) + amount;
          await setSingleDoc("analytics", "main", current);
        } catch(e) {
          console.error("Analytics error:", e);
        }
      }

      async function processPendingWrites() {
        try {
          const pending = JSON.parse(localStorage.getItem("fb_pending_writes") || "[]");
          if (pending.length === 0) return;
          localStorage.setItem("fb_pending_writes", "[]");
          for (const item of pending) {
            if (item.action === "create") {
              await saveToFirestore(item.collection, item.data);
            }
          }
        } catch(e) {}
      }

      // Expose globally
      window.saveToFirestore = saveToFirestore;
      window.updateInFirestore = updateInFirestore;
      window.deleteFromFirestore = deleteFromFirestore;
      window.getFromFirestore = getFromFirestore;
      window.getSingleDoc = getSingleDoc;
      window.setSingleDoc = setSingleDoc;
      window.listenToCollection = listenToCollection;
      window.listenToDoc = listenToDoc;
      window.incrementAnalytic = incrementAnalytic;
      window.processPendingWrites = processPendingWrites;

      window.addEventListener("online", () => {
        processPendingWrites();
      });

      // Signal ready
      window.firebaseReady = true;
      document.dispatchEvent(new Event("firebaseReady"));
    </script>
