      // ADD a new document — returns the new document ID
      async function dbAdd(collectionName, data) {
        try {

          });

          console.error("dbAdd error in " + collectionName + ":", error);
          return saveToCache(collectionName, data);
        }
      }

      // UPDATE an existing document by Firestore ID
      async function dbUpdate(collectionName, docId, data) {
        try {
          const docRef = doc(db, collectionName, docId);

            ...data,

          });

      // GET ALL documents from a collection (one time fetch)
      async function dbGetAll(collectionName, orderByField, orderDir) {
        try {
          const colRef = collection(db, collectionName);
          let q = colRef;
          if (orderByField) {
            q = query(colRef, orderBy(orderByField, orderDir || "asc"));
          }
          const snapshot = await getDocs(q);
          const results = [];
          snapshot.forEach(docSnap => {
            results.push({ id: docSnap.id, firestoreId: docSnap.id, ...docSnap.data() });
          });
          localStorage.setItem("cache_" + collectionName, JSON.stringify(results));
          localStorage.setItem("fb_cache_" + collectionName, JSON.stringify(results));
          return results;
        } catch (error) {
          console.error("dbGetAll error for " + collectionName + ":", error);
          const cached = localStorage.getItem("cache_" + collectionName);
          return cached ? JSON.parse(cached) : [];
        }
      }

      // GET a single document by ID
      async function dbGetOne(collectionName, docId) {
        try {
          const docRef = doc(db, collectionName, docId);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            return { id: docSnap.id, firestoreId: docSnap.id, ...docSnap.data() };

          return true;

          console.error("dbSet error:", error);

        }

      // REAL TIME LISTENER — calls callback every time data changes
      function dbListen(collectionName, callback, orderByField, orderDir) {
        try {
          const colRef = collection(db, collectionName);
          let q = colRef;
          if (orderByField) {
            q = query(colRef, orderBy(orderByField, orderDir || "asc"));
          }
          return onSnapshot(q, (snapshot) => {
            const results = [];
            snapshot.forEach(docSnap => {
              results.push({ id: docSnap.id, firestoreId: docSnap.id, ...docSnap.data() });
            });
            localStorage.setItem("cache_" + collectionName, JSON.stringify(results));
            localStorage.setItem("fb_cache_" + collectionName, JSON.stringify(results));
            callback(results);
          }, (error) => {
            console.error("dbListen error for " + collectionName + ":", error);
            const cached = localStorage.getItem("cache_" + collectionName);
            if (cached) callback(JSON.parse(cached));
          });
        } catch (error) {
          console.error("dbListen setup error:", error);
        }
      }

      // REAL TIME LISTENER — single document
      function dbListenDoc(collectionName, docId, callback) {
        try {
          const docRef = doc(db, collectionName, docId);
          return onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {

          }, (error) => {

      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      function saveToCache(collectionName, data) {
        const key = "cache_" + collectionName;
        const existing = JSON.parse(localStorage.getItem(key) || "[]");
        const newId = "local_" + Date.now();
        existing.unshift({ id: newId, firestoreId: newId, ...data });
        localStorage.setItem(key, JSON.stringify(existing.slice(0, 500)));
        return newId;
      }

      function updateCache(collectionName, docId, data) {
        const key = "cache_" + collectionName;
        const existing = JSON.parse(localStorage.getItem(key) || "[]");
        const index = existing.findIndex(item => item.id === docId);
        if (index !== -1) {
          existing[index] = { ...existing[index], ...data };
          localStorage.setItem(key, JSON.stringify(existing));
        }
      }

      function deleteFromCache(collectionName, docId) {
        const key = "cache_" + collectionName;
        const existing = JSON.parse(localStorage.getItem(key) || "[]");
        const filtered = existing.filter(item => item.id !== docId);
        localStorage.setItem(key, JSON.stringify(filtered));
      }

      function getFromCache(collectionName) {
        const cached = localStorage.getItem("cache_" + collectionName);
        return cached ? JSON.parse(cached) : [];
      }

      window.dbDelete = dbDelete;

      window.getSingleDoc = dbGetOne;

      window.listenToCollection = dbListen;
      window.listenToDoc = dbListenDoc;

      // Signal ready
      window.firebaseReady = true;
      document.dispatchEvent(new Event("firebaseReady"));
    </script>

      function renderFleet(cars) {
        localStorage.setItem("speedrental_cars", JSON.stringify(cars));
        if (typeof window.renderFleet === "function") window.renderFleet();
      }
      function renderOffers(offers) {
        localStorage.setItem("speedrental_offers", JSON.stringify(offers));
        if (typeof window.renderOffers === "function") window.renderOffers();
      }
      function renderAnnouncementBar(ann) {
        localStorage.setItem("speedrental_announcements", JSON.stringify(ann));
        if (typeof window.renderAnnouncementBar === "function") window.renderAnnouncementBar();
      }
      function renderReviews(reviews) {
        localStorage.setItem("speedrental_reviews", JSON.stringify(reviews));
        if (typeof window.renderReviews === "function") window.renderReviews();
      }
      function renderFAQs(faqs) {
        localStorage.setItem("speedrental_faqs", JSON.stringify(faqs));
        if (typeof window.renderFAQs === "function") window.renderFAQs();
      }
      function applyBusinessSettings(settings) {
        localStorage.setItem("speedrental_settings", JSON.stringify(settings));
        if (typeof window.applyBusinessSettings === "function") window.applyBusinessSettings();
      }

      async function loadOffers() {
        const offers = await dbGetAll("offers");
        const active = offers.filter(o => o.active === true);
        renderOffers(active);
      }
      async function loadAnnouncements() {
        const ann = await dbGetAll("announcements");
        renderAnnouncementBar(ann.filter(a => a.active === true));
      }
      async function loadReviews() {
        const reviews = await dbGetAll("reviews");
        const visible = reviews
          .filter(r => r.visible !== false)
          .sort((a, b) => (a.order || 0) - (b.order || 0));
        renderReviews(visible);
      }
      async function loadFAQs() {
        const faqs = await dbGetAll("faqs");
        const visible = faqs
          .filter(f => f.visible !== false)
          .sort((a, b) => (a.order || 0) - (b.order || 0));
        renderFAQs(visible);
      }
      async function loadBusinessSettings() {
        const settings = await dbGetOne("settings", "main");
        if (settings) {
          applyBusinessSettings(settings);
        }
      }

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // REAL TIME SYNC
      window.addEventListener("storage", function(e) {
        const handlers = {
          "speedrental_cars": window.renderFleet,
          "speedrental_offers": window.renderOffers,
          "speedrental_announcements": window.renderAnnouncementBar,
          "speedrental_reviews": window.renderReviews,
          "speedrental_faqs": window.renderFAQs,
          "speedrental_settings": window.applyBusinessSettings
        };
        if (handlers[e.key]) {
          handlers[e.key]();
        }
      });
    </script>
  </body>
